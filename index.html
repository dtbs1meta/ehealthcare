<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eHealthCare - Hệ Thống Quản Lý Khám Bệnh</title>
  <link rel="stylesheet" href="assets/css/pages/index.css">
</head>

<body>

  <div class="login-container">
    <div class="login-card">
      <div class="logo-area">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" />
          </svg>
        </div>
        <div class="logo-title">eHealth<span>Care</span></div>
        <div class="logo-sub">Hệ thống quản lý khám bệnh thông minh</div>
      </div>

      <div class="role-selector">
        <div class="role-label">Chọn vai trò đăng nhập</div>
        <div class="role-grid">
          <div class="role-card selected" onclick="selectRole('patient', this)">
            <div>👨‍⚕️</div>
            <b>Bệnh nhân</b>
            <p>Đặt lịch & xem STT</p>
          </div>

          <div class="role-card" onclick="selectRole('receptionist', this)">
            <div>👩‍💼</div>
            <b>Lễ tân</b>
            <p>Cấp STT & quản lý</p>
          </div>

          <div class="role-card" onclick="selectRole('doctor', this)">
            <div>👨‍⚕️</div>
            <b>Bác sĩ</b>
            <p>Khám bệnh & kê đơn</p>
          </div>
        </div>
      </div>

      <div class="login-form">
        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <input type="text" id="username" placeholder="VD: BN001, BS001, NV001">
        </div>
        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" placeholder="VD: 123456">
        </div>
        <button class="btn-login" id="btnLogin" onclick="loginUser()">Đăng nhập</button>
      </div>

      <div class="features-bar">
        <div class="feature-item">
          <div class="feature-dot"></div>Đăng ký khám online
        </div>
        <div class="feature-item">
          <div class="feature-dot"></div>Xếp hàng thông minh
        </div>
        <div class="feature-item">
          <div class="feature-dot"></div>Quản lý hồ sơ y tế
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/login.js"></script>
</body>

</html>
